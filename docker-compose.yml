name: plex
services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    # network_mode: "host"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      # - PLEX_CLAIM=claim-xxxxxxxxxxxx_xxxxxxx
    volumes:
      - /Volumes/Plex/configs/plex:/config
      - /Volumes/Plex/media:/media
    ports:
      - 32400:32400
    restart: unless-stopped
  sonarr:
    image: sonarr-mkvtoolnix
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - /Volumes/Plex/configs/sonarr:/config
      - /Volumes/Plex/media:/media
      - /Volumes/Plex/scripts:/opt/scripts
      - /Users/valeria/Downloads/Torrent:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
  radarr:
    image: radarr-mkvtoolnix
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - /Volumes/Plex/configs/radarr:/config
      - /Volumes/Plex/media:/media
      - /Volumes/Plex/scripts:/opt/scripts
      - /Users/valeria/Downloads/Torrent:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=568
      - PGID=568
      - TZ=America/Sao_Paulo
    volumes:
      - /Volumes/Plex/configs/prowlarr:/config
      - /Volumes/Plex/media/:/media/
    ports:
      - 9696:9696
    restart: unless-stopped
  profilarr:
    image: santiagosayshey/profilarr:latest
    container_name: profilarr
    ports:
      - 6868:6868
    volumes:
      - /Volumes/Plex/configs/profilarr:/config
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped
