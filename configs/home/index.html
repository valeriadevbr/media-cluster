
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
    <title>Media Server Dash</title>
    <style>
      :root {
        --bg-color: #0f1115;
        --card-bg: rgba(255, 255, 255, 0.05);
        --card-hover: rgba(255, 255, 255, 0.1);
        --text-color: #ffffff;
      }

      body {
        font-family: "Inter", -apple-system, system-ui, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-image: radial-gradient(circle at top right, rgba(29, 35, 48, 0.5) 0%, transparent 40%),
          radial-gradient(circle at bottom left, rgba(229, 160, 13, 0.05) 0%, transparent 40%);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
        width: 90%;
        max-width: 1100px;
        padding: 40px;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 24px;
        padding: 35px 20px;
        text-align: center;
        text-decoration: none;
        color: var(--text-color);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        backdrop-filter: blur(12px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        position: relative;
        overflow: hidden;
      }

      .card:hover {
        transform: translateY(-8px);
        background: var(--card-hover);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .icon {
        width: 52px;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
        transition: transform 0.3s ease;
      }

      .icon svg {
        width: 100%;
        height: 100%;
        fill: currentColor;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
      }

      .card:hover .icon {
        transform: scale(1.1);
      }

      h2 {
        font-size: 1rem;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.5px;
        z-index: 2;
      }

      .alt-port-dot {
        position: absolute;
        top: 15px;
        right: 15px;
        width: 32px;
        height: 32px;
        background-color: rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        cursor: pointer;
        z-index: 10;
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(255,255,255,0.05);
      }

      .alt-port-dot img {
        width: 12px;
        height: 12px;
        margin-bottom: 2px;
        filter: invert(1); /* Make black icon white */
        opacity: 0.9;
        transition: all 0.2s ease;
      }

      .alt-text {
        font-size: 0.35rem; /* Reduced font size */
        font-weight: 800;
        line-height: 1;
        opacity: 0.8;
      }

      .alt-port-dot:hover {
        background-color: var(--glow-color, #fff);
        transform: scale(1.1);
        box-shadow: 0 0 10px var(--glow-color, #fff);
        color: #000;
        border-color: transparent;
      }

      /* Cores Temáticas removidas em favor da geração via JS */

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, var(--glow-color), transparent 70%);
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 1;
      }

      .card:hover::before {
        opacity: 0.15;
      }

      @media (max-width: 700px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 600px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 380px) {
        .grid {
          grid-template-columns: repeat(1, 1fr);
        }
      }

      .alt-port-dot:hover img {
        filter: none;
        opacity: 1;
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <div class="grid" id="app-grid">
    </div>
    <script>
      const apps = [
        { name: 'Plex', host: 'plex.media.lan', color: '#e5a00d', icon: 'plex.svg' },
        { name: 'Emby', host: 'emby.media.lan', color: '#5dd054', icon: 'emby.svg' },
        { name: 'Sonarr', host: 'sonarr.media.lan', color: '#00c0fa', icon: 'sonarr.svg' },
        { name: 'Radarr', host: 'radarr.media.lan', color: '#ffc230', icon: 'radarr.svg' },
        { name: 'Lidarr', host: 'lidarr.media.lan', color: '#00936e', icon: 'lidarr.svg' },
        { name: 'Bazarr', host: 'bazarr.media.lan', color: '#b76bf7', icon: 'bazarr.svg' },
        { name: 'Prowlarr', host: 'prowlarr.media.lan', color: '#ff3333', icon: 'prowlarr.svg' },
        { name: 'Jackett', host: 'jackett.media.lan', color: '#b7f76b', icon: 'jackett.svg' },
        { name: 'Profilarr', host: 'profilarr.media.lan', color: '#6b9cf7', icon: 'profilarr.svg' },
        { name: 'qBittorrent', host: 'qbittorrent.media.lan', color: '#2f67ba', icon: 'qbittorrent.svg' },
        { name: 'Slskd', host: 'slskd.media.lan', color: '#00c3ff', icon: 'slskd.svg' },
      ];

      const grid = document.getElementById('app-grid');

      apps.forEach(app => {
        const url = `https://${app.host}`;
        const card = document.createElement('a');
        card.className = 'card';
        card.href = url;
        card.rel = 'noreferrer';
        card.style.setProperty('--glow-color', app.color);
        card.style.color = app.color;

        card.innerHTML = `
          <div class="alt-port-dot" title="Alt Port (44300)">
            <img src="icons/link.svg" alt="Link" />
            <span class="alt-text">ALT</span>
          </div>
          <div class="icon">
            <img src="icons/${app.icon}" alt="${app.name}" />
          </div>
          <h2>${app.name}</h2>
        `;

        const dot = card.querySelector('.alt-port-dot');
        dot.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          window.location.href = url + ':44300';
        });

        grid.appendChild(card);
      });
    </script>
  </body>
</html>
