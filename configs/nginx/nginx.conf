user nginx;
error_log /var/log/nginx/error.log debug;
pid /var/run/nginx.pid;
worker_processes auto;

events {
  worker_connections 4096;
  accept_mutex on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  upstream plex {
    server plex:32400;
  }
  upstream emby {
    server emby:8096;
  }
  upstream sonarr {
    server sonarr:8989;
  }
  upstream radarr {
    server radarr:7878;
  }
  upstream bazarr {
    server bazarr:6767;
  }
  upstream prowlarr {
    server prowlarr:9696;
  }
  upstream profilarr {
    server profilarr:6868;
  }
  upstream jackett {
    server jackett:9117;
  }

  # HTTPS server blocks for local access
  server {
    listen 443 ssl;
    server_name plex.lan;
    ssl_certificate /config/ssl.lan.crt;
    ssl_certificate_key /config/ssl.lan.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
      proxy_pass http://plex;
      include /etc/nginx/proxy_common.conf;
    }
  }

  server {
    listen 443 ssl;
    server_name emby.lan;
    ssl_certificate /config/ssl.lan.crt;
    ssl_certificate_key /config/ssl.lan.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
      proxy_pass http://emby;
      include /etc/nginx/proxy_common.conf;
    }
  }

  server {
    listen 443 ssl;
    server_name sonarr.lan;
    ssl_certificate /config/ssl.lan.crt;
    ssl_certificate_key /config/ssl.lan.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
      proxy_pass http://sonarr;
      include /etc/nginx/proxy_common.conf;
    }
  }

  server {
    listen 443 ssl;
    server_name radarr.lan;
    ssl_certificate /config/ssl.lan.crt;
    ssl_certificate_key /config/ssl.lan.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
      proxy_pass http://radarr;
      include /etc/nginx/proxy_common.conf;
    }
  }

  server {
    listen 443 ssl;
    server_name bazarr.lan;
    ssl_certificate /config/ssl.lan.crt;
    ssl_certificate_key /config/ssl.lan.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
      proxy_pass http://bazarr;
      include /etc/nginx/proxy_common.conf;
    }
  }

  server {
    listen 443 ssl;
    server_name prowlarr.lan;
    ssl_certificate /config/ssl.lan.crt;
    ssl_certificate_key /config/ssl.lan.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
      proxy_pass http://prowlarr;
      include /etc/nginx/proxy_common.conf;
    }
  }

  server {
    listen 443 ssl;
    server_name profilarr.lan;
    ssl_certificate /config/ssl.lan.crt;
    ssl_certificate_key /config/ssl.lan.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
      proxy_pass http://profilarr;
      include /etc/nginx/proxy_common.conf;
    }
  }

  server {
    listen 443 ssl;
    server_name jackett.lan;
    ssl_certificate /config/ssl.lan.crt;
    ssl_certificate_key /config/ssl.lan.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
      proxy_pass http://jackett;
      include /etc/nginx/proxy_common.conf;
    }
  }

  # HTTPS server block for wan access
  server {
    listen 443 ssl;
    server_name plex.apedamo.duckdns.org;
    ssl_certificate /config/ssl.wan.crt;
    ssl_certificate_key /config/ssl.wan.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
      proxy_pass http://plex;
      include /etc/nginx/proxy_common.conf;
    }
  }

  server {
    listen 443 ssl;
    server_name emby.apedamo.duckdns.org;
    ssl_certificate /config/ssl.wan.crt;
    ssl_certificate_key /config/ssl.wan.key;
    location / {
      proxy_pass http://emby;
      include /etc/nginx/proxy_common.conf;
    }
  }

  # HTTP server blocks to redirect to HTTPS
  server {
    listen 80 default_server;
    server_name _;
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # Catch-all HTTPS server block to handle unmatched requests
  server {
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /config/ssl.lan.crt;
    ssl_certificate_key /config/ssl.lan.key;
    location / {
      return 404;
    }
  }
}
