# PostgreSQL Configuration
# Custom settings for media cluster

# Connection Settings
# Connection Settings
listen_addresses = '*'
max_connections = 200

# Memory Configuration (Target: 2GB RAM container)
shared_buffers = 512MB        # 25% of RAM
effective_cache_size = 1536MB # 75% of RAM
maintenance_work_mem = 128MB  # For index creation/vacuum
work_mem = 4MB                # per-operation memory (conservative)

# Checkpoint & WAL
checkpoint_completion_target = 0.9
wal_buffers = 16MB
min_wal_size = 80MB
max_wal_size = 1GB

# Optimizer / I/O
random_page_cost = 1.1         # SSD storage
effective_io_concurrency = 200 # SSD concurrency
default_statistics_target = 100

# Logging
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_timezone = 'America/Sao_Paulo'

# Locale and Formatting
datestyle = 'iso, mdy'
timezone = 'America/Sao_Paulo'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
