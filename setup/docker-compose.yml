name: plex
services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    hostname: plex.lan
    volumes:
      - ../configs/plex:/config
      - ../media:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}  # Recomendado: usar .env file
      - ADVERTISE_IP=http://192.168.2.1:32400/
    ports:
      - 32400:32400/tcp      # WEB/API/APPS
      - 32410:32410/udp      # SERVER DISCOVERY
      - 32412:32412/udp      # SERVER DISCOVERY
      - 32413:32413/udp      # SERVER DISCOVERY
      - 32414:32414/udp      # SERVER DISCOVERY
      - 8324:8324/tcp        # REMOTE CONTROL
    networks:
      - plex-network
    restart: on-failure

  emby:
    image: emby/embyserver_arm64v8:latest
    container_name: emby
    hostname: emby.lan
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ../configs/emby:/config
      - ../media:/media
    expose:
      - 8096
    networks:
      - plex-network
    restart: on-failure

  sonarr:
    image: sonarr-mkvtoolnix
    container_name: sonarr
    hostname: sonarr.lan
    volumes:
      - ../configs/sonarr:/config
      - ../scripts:/opt/scripts
      - ../media:/media
      - /Users/valeria/Downloads/Torrent:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    expose:
      - 8989
    networks:
      - plex-network
    restart: on-failure

  radarr:
    image: radarr-mkvtoolnix
    container_name: radarr
    hostname: radarr.lan
    volumes:
      - ../configs/radarr:/config
      - ../scripts:/opt/scripts
      - ../media:/media
      - /Users/valeria/Downloads/Torrent:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    expose:
      - 7878
    networks:
      - plex-network
    restart: on-failure

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr.lan
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ../configs/bazarr:/config
      - ../media:/media
    expose:
      - 6767
    networks:
      - plex-network
      - proxy-network
    restart: on-failure

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr.lan
    volumes:
      - ../configs/prowlarr:/config
      - ../media:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    expose:
      - 9696
    networks:
      - plex-network
      - proxy-network
    restart: on-failure

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    hostname: jackett.lan
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - AUTO_UPDATE=true
    volumes:
      - ../configs/jackett:/config
      - /Users/valeria/Downloads/Torrent:/downloads
    expose:
      - 9117
    networks:
      - plex-network
      - proxy-network
    restart: on-failure

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    hostname: flaresolverr.lan
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - TZ=America/Sao_Paulo
      - CAPTCHA_SOLVER=none
      # - PROXY_URL=${PROXY_TYPE}://${PROXY_HOST}:${PROXY_PORT}
      # - PROXY_USERNAME=${PROXY_USERNAME}
      # - PROXY_PASSWORD=${PROXY_PASSWORD}
    expose:
      - 8191
    networks:
      - plex-network
    restart: on-failure

  profilarr:
    image: santiagosayshey/profilarr:latest
    container_name: profilarr
    hostname: profilarr.lan
    volumes:
      - ../configs/profilarr:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    expose:
      - 6868
    networks:
      - plex-network
    restart: on-failure

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    hostname: nginx.lan
    volumes:
      - ../configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../configs/nginx/proxy_common.conf:/etc/nginx/proxy_common.conf:ro
      - ../configs/ssl/lan/localhost.crt:/config/ssl.lan.crt:ro
      - ../configs/ssl/lan/localhost.key:/config/ssl.lan.key:ro
      - ../configs/ssl/wan/apedamo.duckdns.org.crt:/config/ssl.wan.crt:ro
      - ../configs/ssl/wan/apedamo.duckdns.org.key:/config/ssl.wan.key:ro
    depends_on:
      - emby
      - jackett
      - plex
      - profilarr
      - prowlarr
      - radarr
      - sonarr
    ports:
      - 80:80
      - 443:443
    networks:
      - plex-network
    restart: on-failure

  proxy:
    image: ghcr.io/tarampampam/3proxy
    container_name: proxy
    hostname: proxy.lan
    volumes:
      - ../configs/3proxy/3proxy.cfg:/etc/3proxy/3proxy.cfg:rw
    environment:
      EXTRA_CONFIG: |
        auth iponly
        allow * * *.lan * *
        allow * * *.plex.direct * *
        allow * * 172.16.0.0/24 * *
        allow * * 172.16.1.0/24 * *
        parent 1000 connect+ 0.0.0.0 0
        allow *
        parent 1000 ${PROXY_TYPE} ${PROXY_HOST} ${PROXY_PORT} ${PROXY_USERNAME} ${PROXY_PASSWORD}
        deny * * * * *
      MAX_CONNECTIONS: 1024
      PROXY_PORT: 3128
      SOCKS_PORT: 1080
      PRIMARY_RESOLVER: 127.0.0.11
      SECONDARY_RESOLVER: 127.0.0.11
    expose:
      - 3128 # HTTP
      - 1080 # SOCKS5
    networks:
      - plex-network
    restart: unless-stopped

  wisper:
    image: mccloud/subgen:latest
    container_name: wisper
    hostname: wisper.lan
    volumes:
      - ../configs/wisper/models:/subgen/models
      - ../configs/wisper/subgen.env:/subgen/subgen.env:ro
    environment:
      LOG_LEVEL: info
      NAME_SERVERS: 127.0.0.11
      PROCADDEDMEDIA: true
      PROCMEDIAONPLAY: false
      PLEXTOKEN: claim--SEp_3ree_h2Ezs8HvyE
      PLEXSERVER: 'http://plex.lan:32400'
      CONCURRENT_TRANSCRIPTIONS: 2
      USE_PATH_MAPPING: false
      MODEL_PATH: ./models
    expose:
      - 9000
    networks:
      - plex-network
    restart: on-failure

networks:
  plex-network:
    driver: bridge
    attachable: true
    ipam:
      driver: default
      config:
        - subnet: "172.16.0.0/24"
          gateway: "172.16.0.254"

  proxy-network:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: "172.16.1.0/24"
          gateway: "172.16.1.254"
