name: plex
services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    hostname: plex.lan
    volumes:
      - ${CONFIGS_PATH:-.}/plex:/config
      - media_data:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}
      - ADVERTISE_IP=${PLEX_ADVERTISE_IP:-}
    ports:
      - 32400:32400/tcp
      - 32410:32410/udp
      - 32412:32412/udp
      - 32413:32413/udp
      - 32414:32414/udp
      - 8324:8324/tcp
    networks:
      - plex-network
    restart: on-failure

  emby:
    image: emby/embyserver_arm64v8:latest
    container_name: emby
    hostname: emby.lan
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ${CONFIGS_PATH:-.}/emby:/config
      - media_data:/media
    ports:
      - 8096:8096
    networks:
      - plex-network
    restart: on-failure

  sonarr:
    image: sonarr-mkvtoolnix
    container_name: sonarr
    hostname: sonarr.lan
    volumes:
      - ${CONFIGS_PATH:-.}/sonarr:/config
      - scripts_data:/opt/scripts
      - media_data:/media
      - downloads_data:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    expose:
      - 8989
    networks:
      - plex-network
    restart: on-failure

  radarr:
    image: radarr-mkvtoolnix
    container_name: radarr
    hostname: radarr.lan
    volumes:
      - ${CONFIGS_PATH:-.}/radarr:/config
      - scripts_data:/opt/scripts
      - media_data:/media
      - downloads_data:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    expose:
      - 7878
    networks:
      - plex-network
    restart: on-failure

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    hostname: bazarr.lan
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ${CONFIGS_PATH:-.}/bazarr:/config
      - media_data:/media
    expose:
      - 6767
    networks:
      - plex-network
      - proxy-network
    restart: on-failure

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    hostname: prowlarr.lan
    volumes:
      - ${CONFIGS_PATH:-.}/prowlarr:/config
      - media_data:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    expose:
      - 9696
    networks:
      - plex-network
      - proxy-network
    restart: on-failure

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    hostname: jackett.lan
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - AUTO_UPDATE=true
    volumes:
      - ${CONFIGS_PATH:-.}/jackett:/config
      - downloads_data:/downloads
    expose:
      - 9117
    networks:
      - plex-network
      - proxy-network
    restart: on-failure

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    hostname: flaresolverr.lan
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - TZ=America/Sao_Paulo
      - CAPTCHA_SOLVER=none
    expose:
      - 8191
    networks:
      - plex-network
    restart: on-failure

  profilarr:
    image: santiagosayshey/profilarr:latest
    container_name: profilarr
    hostname: profilarr.lan
    volumes:
      - ${CONFIGS_PATH:-.}/profilarr:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    expose:
      - 6868
    networks:
      - plex-network
    restart: on-failure

  wisper:
    image: mccloud/subgen:latest
    platform: linux/amd64
    container_name: wisper
    hostname: wisper.lan
    volumes:
      - ${CONFIGS_PATH:-.}/wisper/models:/subgen/models
      - ${CONFIGS_PATH:-.}/wisper/subgen.env:/subgen/subgen.env:ro
    environment:
      LOG_LEVEL: info
      NAME_SERVERS: 127.0.0.11
      PROCADDEDMEDIA: true
      PROCMEDIAONPLAY: false
      PLEXTOKEN: ${PLEX_CLAIM:-}
      PLEXSERVER: "http://plex.lan:32400"
      CONCURRENT_TRANSCRIPTIONS: 2
      USE_PATH_MAPPING: false
      MODEL_PATH: ./models
    expose:
      - 9000
    networks:
      - plex-network
    restart: on-failure

  proxy:
    image: ghcr.io/tarampampam/3proxy
    container_name: proxy
    hostname: proxy.lan
    volumes:
      - ${CONFIGS_PATH:-.}/3proxy/3proxy.cfg:/etc/3proxy/3proxy.cfg
    environment:
      EXTRA_CONFIG: |
        auth iponly
        allow * * *.lan * *
        allow * * *.plex.direct * *
        allow * * 172.16.0.0/24 * *
        allow * * 172.16.1.0/24 * *
        parent 1000 connect+ 0.0.0.0 0
        allow *
        parent 1000 ${PROXY_TYPE} ${PROXY_HOST} ${PROXY_PORT} ${PROXY_USERNAME} ${PROXY_PASSWORD}
        deny * * * * *
      MAX_CONNECTIONS: 1024
      PROXY_PORT: 3128
      SOCKS_PORT: 1080
      PRIMARY_RESOLVER: 127.0.0.11
      SECONDARY_RESOLVER: 127.0.0.11
    expose:
      - 3128
      - 1080
    networks:
      - plex-network
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    hostname: caddy.lan
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC)
    volumes:
      - ${CONFIGS_PATH:-.}/caddy/data:/data
      - ${CONFIGS_PATH:-.}/caddy/config:/config
      - ${CONFIGS_PATH:-.}/caddy/Caddyfile:/etc/caddy/Caddyfile:rw
      - certs_lan_data:/certs/lan:ro
      - certs_wan_data:/certs/wan:ro
    networks:
      - plex-network
    restart: on-failure

  dns:
    image: 4km3/dnsmasq
    container_name: dns
    hostname: dns.lan
    volumes:
      - ${CONFIGS_PATH:-.}/dns/dnsmasq.conf:/etc/dnsmasq.conf:ro
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    cap_add:
      - NET_ADMIN
    restart: on-failure

networks:
  plex-network:
    driver: bridge
    attachable: true
    ipam:
      driver: default
      config:
        - subnet: "172.16.0.0/24"
          gateway: "172.16.0.254"
  proxy-network:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: "172.16.1.0/24"
          gateway: "172.16.1.254"

volumes:
  media_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_PATH:-.}
  downloads_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOWNLOADS_PATH:-.}
  scripts_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${SCRIPTS_PATH:-.}
  certs_lan_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CONFIGS_PATH:-.}/ssl/lan
  certs_wan_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CONFIGS_PATH:-.}/ssl/wan
