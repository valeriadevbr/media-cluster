apiVersion: apps/v1
kind: Deployment
metadata:
  name: profilarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profilarr
  template:
    metadata:
      labels:
        app: profilarr
    spec:
      containers:
      - name: profilarr
        image: santiagosayshey/profilarr:latest
        ports:
        - containerPort: 6868
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 6868
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 6868
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "America/Sao_Paulo"
        volumeMounts:
        - name: configs
          mountPath: /config
          subPath: profilarr
      volumes:
      - name: configs
        persistentVolumeClaim:
          claimName: configs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: profilarr
  namespace: media
spec:
  selector:
    app: profilarr
  ports:
    - port: 6868
      targetPort: 6868
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: profilarr-lan
  namespace: media
spec:
  entryPoints:
    - websecure
    - websecure-alt
  routes:
    - match: Host(`profilarr.media.lan`)
      kind: Rule
      services:
        - name: profilarr
          port: 6868
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: profilarr-lan-http
  namespace: media
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`profilarr.media.lan`)
      kind: Rule
      middlewares:
        - name: https-redirect
          namespace: media
      services:
        - name: profilarr
          port: 6868
