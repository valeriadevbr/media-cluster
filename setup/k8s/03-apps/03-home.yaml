apiVersion: apps/v1
kind: Deployment
metadata:
  name: home
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home
  template:
    metadata:
      labels:
        app: home
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - name: content
          subPath: home
          mountPath: /usr/share/nginx/html
      volumes:
      - name: content
        persistentVolumeClaim:
          claimName: configs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: home
  namespace: media
spec:
  selector:
    app: home
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home
  namespace: media
spec:
  entryPoints:
    - websecure
    - websecure-alt
  routes:
    - match: Host(`dashboard.media.lan`)
      kind: Rule
      services:
        - name: home
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-http
  namespace: media
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`dashboard.media.lan`)
      kind: Rule
      middlewares:
        - name: https-redirect
          namespace: media
      services:
        - name: home
          port: 80
