apiVersion: apps/v1
kind: Deployment
metadata:
  name: slskd
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slskd
  template:
    metadata:
      labels:
        app: slskd
    spec:
      containers:
      - name: slskd
        image: slskd/slskd:latest
        ports:
          - name: slskd-webui
            containerPort: 5030
          - name: slskd-peer
            containerPort: 50300
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          tcpSocket:
            port: 5030
          initialDelaySeconds: 60
          periodSeconds: 20
          failureThreshold: 5
        readinessProbe:
          tcpSocket:
            port: 5030
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 5
        env:
        - name: TZ
          value: "America/Sao_Paulo"
        - name: SLSKD_REMOTE_CONFIGURATION
          value: "true"
        - name: SLSKD_SHARED_DIR
          value: "/music"
        volumeMounts:
        - name: configs
          mountPath: /app
          subPath: slskd
        - name: downloads
          mountPath: /app/downloads
        - name: media
          mountPath: /music
          subPath: Music
      volumes:
      - name: configs
        persistentVolumeClaim:
          claimName: configs-pvc
      - name: downloads
        persistentVolumeClaim:
          claimName: downloads-pvc
      - name: media
        persistentVolumeClaim:
          claimName: media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: slskd
  namespace: media
spec:
  selector:
    app: slskd
  type: NodePort
  externalTrafficPolicy: Local
  ports:
    - name: slskd-webui
      port: 5030
      targetPort: 5030
    - name: slskd-peer
      port: 50300
      targetPort: 50300
      nodePort: 50300
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slskd-ingress
  namespace: media
  annotations:

spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - "slskd.media.lan"
    secretName: media-lan-tls
  rules:
      - host: "slskd.media.lan"
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: slskd
                port:
                  number: 5030
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slskd-ingress-http
  namespace: media
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: traefik
  rules:
      - host: "slskd.media.lan"
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: slskd
                port:
                  number: 5030
