apiVersion: v1
kind: ConfigMap
metadata:
  name: default-backend-html
  namespace: infra
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>404 - Route Not Found</title>
        <style>
            body {
                background-color: #0f172a;
                color: #e2e8f0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
                text-align: center;
            }
            .container {
                background-color: #1e293b;
                padding: 3rem;
                border-radius: 1rem;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
                max-width: 500px;
                width: 90%;
            }
            h1 {
                font-size: 4rem;
                margin: 0;
                color: #38bdf8;
                font-weight: 800;
            }
            h2 {
                margin: 1rem 0;
                font-size: 1.5rem;
                font-weight: 600;
            }
            p {
                color: #94a3b8;
                line-height: 1.6;
            }
            .divider {
                height: 2px;
                background: linear-gradient(90deg, transparent, #38bdf8, transparent);
                margin: 2rem 0;
                width: 100%;
            }
            .status-code {
                font-family: 'Courier New', Courier, monospace;
                background-color: #334155;
                padding: 0.2rem 0.5rem;
                border-radius: 0.25rem;
                font-size: 0.9rem;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>404</h1>
            <h2>Destination Unknown</h2>
            <div class="divider"></div>
            <p>The host or path you are trying to access is not configured on this cluster.</p>
            <p>Please check the URL or contact the administrator.</p>
            <br>
            <span class="status-code">Traefik Default Backend</span>
        </div>
    </body>
    </html>

  default.conf: |
    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Direct all requests to serve 404 error with content of /index.html
        error_page 404 /index.html;

        location / {
           return 404;
        }

        location = /index.html {
            internal;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: default-backend
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: default-backend
  template:
    metadata:
      labels:
        app: default-backend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: html-volume
        configMap:
          name: default-backend-html
          items:
            - key: index.html
              path: index.html
      - name: config-volume
        configMap:
          name: default-backend-html
          items:
            - key: default.conf
              path: default.conf
---
apiVersion: v1
kind: Service
metadata:
  name: default-backend
  namespace: infra
spec:
  selector:
    app: default-backend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: default-backend
  namespace: infra
spec:
  entryPoints:
    - web
    - websecure
    - websecure-alt
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: default-backend
          port: 80
