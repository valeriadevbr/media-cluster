providers:
  kubernetesCRD:
    allowExternalNameServices: true
    allowCrossNamespace: true
    enabled: true

service:
  type: NodePort

persistence:
  enabled: false

additionalArguments:
  - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
  - "--certificatesresolvers.le.acme.storage=/acme/acme.json"
  - "--certificatesresolvers.le.acme.dnschallenge.provider=${ACME_PROVIDER}"
  - "--certificatesresolvers.le.acme.dnschallenge.delayBeforeCheck=60"
  - "--certificatesresolvers.le.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"

env:
  - name: DYNU_API_KEY
    value: "${DYNU_API_KEY}"

ports:
  traefik:
    port: 9000
    expose:
      default: true
    exposedPort: 9000
    protocol: TCP
  web:
    nodePort: 80
    middlewares:
      - ingress-traefik-gzip@kubernetescrd
  web-wan:
    port: 44000
    exposedPort: 44000
    nodePort: 44000
    expose:
      default: true
    middlewares:
      - ingress-traefik-gzip@kubernetescrd
  websecure:
    nodePort: 443
    http3:
      enabled: true
    middlewares:
      - ingress-traefik-gzip@kubernetescrd
    tls:
      enabled: true
  websecure-wan:
    port: 44300
    exposedPort: 44300
    nodePort: 44300
    expose:
      default: true
    http3:
      enabled: true
    tls:
      enabled: true
      certResolver: le
    middlewares:
      - ingress-traefik-gzip@kubernetescrd

api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.media.lan`) || Host(`traefik.media.${WAN_HOSTNAME}`)
    entryPoints:
      - websecure

additionalVolumeMounts:
  - name: certs-data
    mountPath: /acme

deployment:
  additionalVolumes:
    - name: certs-data
      hostPath:
        path: /mnt/configs/traefik
        type: DirectoryOrCreate
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
  securityContext:
    capabilities:
      add:
        - NET_BIND_SERVICE

ping:
  enabled: true
  entryPoint: traefik

logs:
  general:
    level: INFO
