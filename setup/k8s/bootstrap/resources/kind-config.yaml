kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            service-node-port-range: 1-65535
      - |
        kind: KubeletConfiguration
        resolvConf: "/etc/kubernetes/resolv.conf"
    extraPortMappings:
      - containerPort: 53 # DNS TCP
        hostPort: 53
        protocol: TCP
      - containerPort: 53 # DNS UDP
        hostPort: 53
        protocol: UDP
      - containerPort: 80 # HTTP
        hostPort: 80
        protocol: TCP
      - containerPort: 443 # HTTPS
        hostPort: 443
        protocol: TCP
      # - containerPort: 8096 # Plex TCP Direct
      #   hostPort: 8096
      #   protocol: TCP
      # - containerPort: 7359 # Emby Discovery
      #   hostPort: 7359
      #   protocol: UDP
      # - containerPort: 32400 # Plex TCP Direct (PMS)
      #   hostPort: 32400
      #   protocol: TCP
      # - containerPort: 32410 # Plex GDM
      #   hostPort: 32410
      #   protocol: UDP
      # - containerPort: 32412 # Plex GDM
      #   hostPort: 32412
      #   protocol: UDP
      # - containerPort: 32413 # Plex GDM
      #   hostPort: 32413
      #   protocol: UDP
      # - containerPort: 32414 # Plex GDM
      #   hostPort: 32414
      #   protocol: UDP
      - containerPort: 44000 # HTTP WAN (web-wan)
        hostPort: 44000
        protocol: TCP
      - containerPort: 44300 # HTTPS WAN (websecure-wan)
        hostPort: 44300
        protocol: TCP
      - containerPort: 50300 # Soulseek Peer TCP
        hostPort: 50300
        protocol: TCP
      - containerPort: 53471 # qBittorrent Peer TCP
        hostPort: 53471
        protocol: TCP
      - containerPort: 53471 # qBittorrent Peer UDP
        hostPort: 53471
        protocol: UDP
    extraMounts:
      - hostPath: ${CONFIGS_PATH}
        containerPath: /mnt/configs
      - hostPath: ${MEDIA_PATH}
        containerPath: /mnt/media
      - hostPath: ${SCRIPTS_PATH}
        containerPath: /mnt/scripts
      - hostPath: ${DOWNLOADS_PATH}
        containerPath: /mnt/downloads
      - hostPath: ${CONFIGS_PATH}/kind/resolv.conf
        containerPath: /etc/kubernetes/resolv.conf
