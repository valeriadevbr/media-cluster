providers:
  kubernetesCRD:
    allowExternalNameServices: true
    allowCrossNamespace: true
    enabled: true
    namespaces:
      - infra
      - ingress-traefik-infra

ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik-infra

service:
  type: NodePort

persistence:
  enabled: false

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

ports:
  traefik:
    port: 9000
    expose:
      default: true
    exposedPort: 9000
    nodePort: 9000
    protocol: TCP
  web:
    port: 8000
    exposedPort: 80
    nodePort: 80
    http:
      middlewares:
        - ingress-traefik-infra-error-pages@kubernetescrd
  web-wan:
    port: 44000
    exposedPort: 44000
    nodePort: 44000
    expose:
      default: true
    http:
      middlewares:
        - ingress-traefik-infra-error-pages@kubernetescrd
  websecure:
    port: 8443
    exposedPort: 443
    nodePort: 443
    http:
      middlewares:
        - ingress-traefik-infra-error-pages@kubernetescrd
      tls:
        enabled: true
    http3:
      enabled: true
  websecure-wan:
    port: 44300
    exposedPort: 44300
    nodePort: 44300
    expose:
      default: true
    http:
      middlewares:
        - ingress-traefik-infra-error-pages@kubernetescrd
      tls:
        enabled: true
    http3:
      enabled: true

api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/target: "${DOCKER_HOST_IP}"
    matchRule: Host(`traefik.infra.lan`) || Host(`traefik.infra.${WAN_HOSTNAME}`)
    entryPoints:
      - websecure

deployment:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
  securityContext:
    capabilities:
      add:
        - NET_BIND_SERVICE

logs:
  general:
    level: ERROR
  access:
    enabled: false
