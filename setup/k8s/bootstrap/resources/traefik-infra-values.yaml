providers:
  kubernetesCRD:
    allowExternalNameServices: true
    allowCrossNamespace: true
    enabled: true
    namespaces:
      - infra
      - ingress-traefik-infra

ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik-infra

service:
  type: LoadBalancer

persistence:
  enabled: false

ports:
  traefik:
    port: 9000
    expose:
      default: false
    exposedPort: 9000
    protocol: TCP
  web:
    port: 8000
    exposedPort: 80
    http:
      middlewares:
        - ingress-traefik-infra-error-pages@kubernetescrd
  web-wan:
    port: 44000
    exposedPort: 44000
    expose:
      default: true
    http:
      middlewares:
        - ingress-traefik-infra-error-pages@kubernetescrd
  websecure:
    port: 8443
    exposedPort: 443
    http:
      middlewares:
        - ingress-traefik-infra-error-pages@kubernetescrd
      tls:
        enabled: true
    http3:
      enabled: true
  websecure-wan:
    port: 44300
    exposedPort: 44300
    expose:
      default: true
    http:
      middlewares:
        - ingress-traefik-infra-error-pages@kubernetescrd
      tls:
        enabled: true
    http3:
      enabled: true

api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/target: "${DOCKER_HOST_IP}"
    matchRule: Host(`traefik.infra.lan`) || Host(`traefik.infra.${WAN_HOSTNAME}`)
    entryPoints:
      - websecure

deployment:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
  securityContext:
    capabilities:
      add:
        - NET_BIND_SERVICE

logs:
  general:
    level: ERROR
  access:
    enabled: false
rbac:
  enabled: true
  namespaced: false # For EndpointSlices and Nodes access

additionalArguments:
  - --providers.kubernetesingress.ingressclass=traefik-infra
# Extra RBAC rules for v3.1 support (EndpointSlices, Nodes, etc.)
# Note: Newer charts might handle this, but adding it to be safe for this specific bootstrap.
# Actually, the chart usually handles this if rbac.enabled=true.
# But let's follow the POC's explicit needs if we encounter issues.
# For now, let's just ensure LoadBalancer is set.
