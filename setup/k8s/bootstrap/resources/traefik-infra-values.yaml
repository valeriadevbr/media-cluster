providers:
  kubernetesCRD:
    allowExternalNameServices: true
    allowCrossNamespace: true
    enabled: true

service:
  type: NodePort

persistence:
  enabled: false

ports:
  traefik:
    port: 9000
    expose:
      default: true
    exposedPort: 9000
    nodePort: 9000
    protocol: TCP
  web:
    port: 8000
    exposedPort: 80
    nodePort: 80
    middlewares:
      - "ingress-traefik-error-pages@kubernetescrd"
  web-wan:
    port: 44000
    exposedPort: 44000
    nodePort: 44000
    expose:
      default: true
    middlewares:
      - "ingress-traefik-error-pages@kubernetescrd"
  websecure:
    port: 8443
    exposedPort: 443
    nodePort: 443
    middlewares:
      - "ingress-traefik-error-pages@kubernetescrd"
    http3:
      enabled: true
    tls:
      enabled: true
  websecure-wan:
    port: 44300
    exposedPort: 44300
    nodePort: 44300
    expose:
      default: true
    middlewares:
      - "ingress-traefik-error-pages@kubernetescrd"
    http3:
      enabled: true
    tls:
      enabled: true

api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/target: "${DOCKER_HOST_IP}"
    matchRule: Host(`traefik.infra.lan`) || Host(`traefik.infra.${WAN_HOSTNAME}`)
    entryPoints:
      - websecure

deployment:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
  securityContext:
    capabilities:
      add:
        - NET_BIND_SERVICE

ping:
  enabled: true
  entryPoint: traefik

logs:
  general:
    level: ERROR
  access:
    enabled: false
