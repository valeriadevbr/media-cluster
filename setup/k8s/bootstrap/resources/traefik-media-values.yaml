providers:
  kubernetesCRD:
    enabled: true
    allowExternalNameServices: true
    allowCrossNamespace: true
    namespaces:
      - media
      - ingress-traefik-media

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik-media

service:
  type: ClusterIP

persistence:
  enabled: false

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

ports:
  traefik:
    port: 9000
    expose:
      default: true
    exposedPort: 9000
    protocol: TCP
  web:
    port: 8000
    exposedPort: 80
    http:
      middlewares:
        - ingress-traefik-media-error-pages@kubernetescrd
  web-external:
    port: 8001
    exposedPort: 81
    expose:
      default: true
    http:
      middlewares:
        - ingress-traefik-media-error-pages@kubernetescrd

api:
  dashboard: true
  insecure: true

ingressRoute:
  dashboard:
    enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/target: "${DOCKER_HOST_IP}"
    matchRule: Host(`traefik.media.lan`) || Host(`traefik.media.${WAN_HOSTNAME}`)
    entryPoints:
      - web

deployment:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532

logs:
  general:
    level: ERROR
  access:
    enabled: false
