apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns-infra
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["traefik.containo.us", "traefik.io"]
    resources: ["ingressroutes", "ingressroutetcps", "ingressrouteudps"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-viewer-infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns-infra
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: infra
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: infra
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.15.1
          args:
            - --source=traefik-proxy
            - --traefik-disable-legacy
            - --domain-filter=infra.lan.
            - --domain-filter=infra.${WAN_HOSTNAME}.
            - --provider=rfc2136
            - --rfc2136-host=dns.infra.svc.cluster.local
            - --rfc2136-port=53
            - --rfc2136-zone=infra.lan
            - --rfc2136-zone=infra.${WAN_HOSTNAME}
            - --rfc2136-tsig-secret-alg=hmac-sha256
            - --rfc2136-tsig-keyname=externaldns-key
            - --rfc2136-min-ttl=60s
            - --log-level=debug
          env:
            - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
              valueFrom:
                secretKeyRef:
                  name: rfc2136-tsig-secret
                  key: tsig-secret
