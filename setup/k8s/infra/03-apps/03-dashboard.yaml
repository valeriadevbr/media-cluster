apiVersion: v1
kind: Namespace
metadata:
  name: dashboard
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: configs-dashboard-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/configs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: configs-pvc
  namespace: dashboard
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: manual
  resources:
    requests:
      storage: 10Gi
  volumeName: configs-dashboard-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: pinger
          image: python:3-slim
          command:
            [
              "/bin/sh",
              "-c",
              "pip install websockets && python3 -u /app/pinger.py",
            ]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: content
              subPath: dashboard/backend/pinger.py
              mountPath: /app/pinger.py
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: content
              subPath: dashboard/frontend
              mountPath: /usr/share/nginx/html
            - name: content
              subPath: dashboard/nginx/default.conf
              mountPath: /etc/nginx/conf.d/default.conf
      volumes:
        - name: content
          persistentVolumeClaim:
            claimName: configs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: dashboard
spec:
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
