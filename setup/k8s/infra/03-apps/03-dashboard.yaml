# --- IngressRoutes ---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard-lan
  namespace: dashboard
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`dashboard.infra.lan`) || Host(`dashboard.infra.${WAN_HOSTNAME}`)
      kind: Rule
      services:
        - name: dashboard
          port: 80
  tls:
    secretName: media-lan-tls
