apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: default
  namespace: infra
spec:
  minVersion: VersionTLS13
  cipherSuites:
    - TLS_AES_128_GCM_SHA256
    - TLS_AES_256_GCM_SHA384
    - TLS_CHACHA20_POLY1305_SHA256
  curvePreferences:
    - CurveP521
    - CurveP384
  sniStrict: false
