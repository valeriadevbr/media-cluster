apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: global-http-catchall
  namespace: infra
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: https-redirect
          namespace: infra
      services:
        - name: gateway
          port: 80
# Catch-all for WAN if needed, but prioritizing LAN first.
