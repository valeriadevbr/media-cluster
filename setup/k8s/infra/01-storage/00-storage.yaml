apiVersion: v1
kind: PersistentVolume
metadata:
  name: configs-infra-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/configs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: configs-pvc
  namespace: infra
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: manual
  resources:
    requests:
      storage: 10Gi
  volumeName: configs-infra-pv
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: scripts-infra-pv
spec:
  capacity:
    storage: 128Mi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/scripts
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scripts-pvc
  namespace: infra
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: manual
  resources:
    requests:
      storage: 128Mi
  volumeName: scripts-infra-pv
