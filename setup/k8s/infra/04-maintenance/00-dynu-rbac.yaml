apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dynu-webhook-secret-reader
  namespace: cert-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dynu-webhook-secret-reader-binding
  namespace: cert-manager
subjects:
  - kind: ServiceAccount
    name: cert-manager-dynu-webhook
    namespace: cert-manager
roleRef:
  kind: Role
  name: dynu-webhook-secret-reader
  apiGroup: rbac.authorization.k8s.io
