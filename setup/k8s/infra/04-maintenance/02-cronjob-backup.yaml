apiVersion: batch/v1
kind: CronJob
metadata:
  name: wan-cert-backup
  namespace: infra
spec:
  schedule: "0 0 * * *" # Run daily at midnight
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Backing up wan-wildcard-tls secret..."
                  mkdir -p /mnt/configs/backups
                  kubectl get secret wan-wildcard-tls -n infra -o yaml > /tmp/secret.yaml
                  # Simple cleanup of metadata to allow clean apply later
                  grep -v 'creationTimestamp:' /tmp/secret.yaml | \
                  grep -v 'resourceVersion:' | \
                  grep -v 'uid:' | \
                  grep -v 'selfLink:' | \
                  grep -v 'managedFields:' > /mnt/configs/backups/wan-cert.yaml
                  echo "Backup completed to /mnt/configs/backups/wan-cert.yaml"
              volumeMounts:
                - name: configs
                  mountPath: /mnt/configs
          restartPolicy: OnFailure
          serviceAccountName: wan-cert-backup
          volumes:
            - name: configs
              hostPath:
                path: /mnt/configs
                type: Directory
