apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wan-wildcard-cert-controller
  namespace: media
spec:
  entryPoints:
    - websecure-wan
    - websecure
  routes:
    - match: Host(`${WAN_HOSTNAME}`)
      kind: Rule
      services:
        - name: default-backend-external
          port: 80
  tls:
    certResolver: le
    domains:
      - main: "*.${WAN_HOSTNAME}"
        sans:
          - "*.media.${WAN_HOSTNAME}"
---
apiVersion: v1
kind: Service
metadata:
  name: default-backend-external
  namespace: media
spec:
  type: ExternalName
  externalName: default-backend.infra.svc.cluster.local
  ports:
    - name: http
      port: 80
      targetPort: 80
