apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: local-ca
spec:
  ca:
    secretName: local-ca-key-pair
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: media-lan-tls
  namespace: ingress-traefik
spec:
  secretName: media-lan-tls
  duration: 2160h
  renewBefore: 360h
  commonName: "media.lan"
  subject:
    organizations:
      - "DevilCOM Network"
    organizationalUnits:
      - "Media Cluster"
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - "media.lan"
    - "*.media.lan"
  issuerRef:
    name: local-ca
    kind: ClusterIssuer
    group: cert-manager.io
