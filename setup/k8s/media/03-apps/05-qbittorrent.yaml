apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          ports:
            - name: webui
              containerPort: 8081
            - name: torrent-tcp
              containerPort: 53471
              protocol: TCP
            - name: torrent-udp
              containerPort: 53471
              protocol: UDP
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Sao_Paulo"
            - name: WEBUI_PORT
              value: "8081"
            - name: TORRENTING_PORT
              value: "53471"
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: qbittorrent
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: configs-pvc
        - name: downloads
          persistentVolumeClaim:
            claimName: downloads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
spec:
  selector:
    app: qbittorrent
  type: NodePort
  externalTrafficPolicy: Local
  ports:
    - name: webui
      port: 8081
      targetPort: 8081
    - name: torrent-tcp
      port: 53471
      targetPort: 53471
      nodePort: 53471
      protocol: TCP
    - name: torrent-udp
      port: 53471
      targetPort: 53471
      nodePort: 53471
      protocol: UDP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: qbittorrent-lan
  namespace: media
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`qbittorrent.media.lan`)
      kind: Rule
      services:
        - name: qbittorrent
          port: 8081
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: qbittorrent-lan-wan-host
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`qbittorrent.media.${WAN_HOSTNAME}`)
      kind: Rule
      services:
        - name: qbittorrent
          port: 8081
  tls: {}
