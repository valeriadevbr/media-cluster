apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lidarr
  namespace: media
spec:
  serviceName: lidarr
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: lidarr
  template:
    metadata:
      labels:
        app: lidarr
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: lidarr
          image: ghcr.io/hotio/lidarr:pr-plugins
          imagePullPolicy: Always
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    exec > /config/poststart.log 2>&1
                    set -x
                    echo "Starting Hook at $(date)"
                    sleep 10

                    install_apk() {
                      for i in 1 2 3 4 5; do
                        apk add --no-cache "$@" && return 0
                        echo "APK Attempt $i failed. Retrying in 5s..."
                        sleep 5
                      done
                      return 1
                    }

                    install_apk \
                      ffmpeg \
                      gst-plugins-base \
                      imagemagick \
                      kid3 \
                      jq \
                      py3-pip || { echo "APK Failed after retries"; exit 1; }

                    if [ ! -d "/tmp/.venv" ] || [ ! -f "/tmp/.venv/bin/pip" ]; then
                      echo "Creating VENV"
                      rm -rf /tmp/.venv
                      python3 -m venv /tmp/.venv || { echo "Venv Failed"; exit 1; }
                    fi

                    install_pip() {
                      for i in 1 2 3; do
                        /tmp/.venv/bin/python3 -m pip install --no-cache-dir "$@" && return 0
                        echo "PIP Attempt $i failed. Retrying in 5s..."
                        sleep 5
                      done
                      return 1
                    }

                    install_pip \
                      lrclibapi \
                      yq || { echo "PIP Failed after retries"; exit 1; }

                    echo "Hook Success"
                    exit 0
          ports:
            - containerPort: 8686
              name: lidarr
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: 8686
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8686
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: PATH
              value: "/tmp/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: PUID
              value: "${PUID}"
            - name: PGID
              value: "${PGID}"
            - name: TZ
              value: "UTC" # <-- fix para lidarr não mostrar a data de release errada
            - name: FANART_API_KEY
              value: "${FANART_API_KEY}"
            - name: LIDARR__POSTGRES__HOST
              value: "postgres-lb.media.svc.cluster.local"
            - name: LIDARR__POSTGRES__PORT
              value: "5432"
            - name: LIDARR__POSTGRES__USER
              value: "lidarr"
            - name: LIDARR__POSTGRES__PASSWORD
              value: "${LIDARR_DB_PASSWORD}"
            - name: LIDARR__POSTGRES__MAINDB
              value: "lidarr_main"
            - name: LIDARR__POSTGRES__LOGDB
              value: "lidarr_logs"
          volumeMounts:
            - name: configs
              mountPath: /config
              subPath: lidarr
            - name: downloads
              mountPath: /downloads
            - name: media
              mountPath: /media
            - name: scripts
              mountPath: /opt/scripts
              subPath: arr
              readOnly: true
      volumes:
        - name: configs
          persistentVolumeClaim:
            claimName: configs-pvc
        - name: downloads
          persistentVolumeClaim:
            claimName: downloads-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
        - name: scripts
          persistentVolumeClaim:
            claimName: scripts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: lidarr
  namespace: media
spec:
  selector:
    app: lidarr
  ports:
    - port: 8686
      targetPort: 8686
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/target: "${DOCKER_HOST_IP}"
  name: lidarr-lan
  namespace: media
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`lidarr.media.lan`) || Host(`lidarr.media.${WAN_HOSTNAME}`) || Host(`lidarr-service`)
      kind: Rule
      services:
        - name: lidarr
          port: 8686
