apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: media
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      priorityClassName: critical-media
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: Always
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "${POSTGRES_USER}"
            - name: POSTGRES_PASSWORD
              value: "${POSTGRES_PASSWORD}"
            - name: LIDARR_DB_PASSWORD
              value: "${LIDARR_DB_PASSWORD}"
            - name: SONARR_DB_PASSWORD
              value: "${SONARR_DB_PASSWORD}"
            - name: RADARR_DB_PASSWORD
              value: "${RADARR_DB_PASSWORD}"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: TZ
              value: "America/Sao_Paulo"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $(POSTGRES_USER)
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $(POSTGRES_USER)
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: configs
              mountPath: /var/lib/postgresql/data
              subPath: postgres/data
            - name: configs
              mountPath: /docker-entrypoint-initdb.d
              subPath: postgres/scripts
              readOnly: true
            - name: configs
              mountPath: /etc/postgresql
              subPath: postgres/config
              readOnly: true
          args:
            - -c
            - config_file=/etc/postgresql/postgresql.conf
      volumes:
        - name: configs
          persistentVolumeClaim:
            claimName: configs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: media
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-lb
  namespace: media
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: LoadBalancer
