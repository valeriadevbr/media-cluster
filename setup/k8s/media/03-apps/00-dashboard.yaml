apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: pinger
          image: python:3-slim
          command:
            [
              "/bin/sh",
              "-c",
              "pip install websockets && python3 -u /app/pinger.py",
            ]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: content
              subPath: dashboard/backend/pinger.py
              mountPath: /app/pinger.py
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: content
              subPath: dashboard/frontend
              mountPath: /usr/share/nginx/html
            - name: content
              subPath: dashboard/nginx/default.conf
              mountPath: /etc/nginx/conf.d/default.conf
            - name: cert
              subPath: ca/ca.crt
              mountPath: /usr/share/nginx/ca/ca.crt
      volumes:
        - name: content
          persistentVolumeClaim:
            claimName: configs-pvc
        - name: cert
          persistentVolumeClaim:
            claimName: certs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: media
spec:
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard-lan
  namespace: media
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`dashboard.media.lan`)
      kind: Rule
      services:
        - name: dashboard
          port: 80
