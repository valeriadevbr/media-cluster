apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: slskd
  namespace: media
spec:
  serviceName: slskd
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: slskd
  template:
    metadata:
      labels:
        app: slskd
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: slskd
          image: slskd/slskd:latest
          imagePullPolicy: Always
          ports:
            - name: slskd-webui
              containerPort: 5030
            - name: slskd-peer
              containerPort: 50300
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "3000m"
          livenessProbe:
            tcpSocket:
              port: 5030
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 5030
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          env:
            - name: TZ
              value: "America/Sao_Paulo"
            - name: SLSKD_REMOTE_CONFIGURATION
              value: "true"
            - name: SLSKD_SHARED_DIR
              value: "/music"
          volumeMounts:
            - name: configs
              mountPath: /app
              subPath: slskd
            - name: downloads
              mountPath: /app/downloads
            - name: media
              mountPath: /music
              subPath: Music
      volumes:
        - name: configs
          persistentVolumeClaim:
            claimName: configs-pvc
        - name: downloads
          persistentVolumeClaim:
            claimName: downloads-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: slskd
  namespace: media
spec:
  selector:
    app: slskd
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - name: slskd-webui
      port: 5030
      targetPort: 5030
    - name: slskd-peer
      port: 50300
      targetPort: 50300
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/target: "${DOCKER_HOST_IP}"
  name: slskd-lan
  namespace: media
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`slskd.media.lan`) || Host(`slskd.media.${WAN_HOSTNAME}`)
      kind: Rule
      services:
        - name: slskd
          port: 5030
