apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest
  namespace: media
  labels:
    app: speedtest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speedtest
  template:
    metadata:
      labels:
        app: speedtest
    spec:
      containers:
        - name: speedtest
          image: openspeedtest/latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: speedtest
  namespace: media
spec:
  selector:
    app: speedtest
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: speedtest
  namespace: media
spec:
  entryPoints:
    - web
    - websecure
    - web-wan
    - websecure-wan
  routes:
    - match: Host(`media.${WAN_HOSTNAME}`)
      kind: Rule
      services:
        - name: speedtest
          port: 3000
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: speedtest-lan
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`speedtest.media.lan`)
      kind: Rule
      services:
        - name: speedtest
          port: 3000
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: speedtest-lan-http
  namespace: media
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`speedtest.media.lan`)
      kind: Rule
      middlewares:
        - name: https-redirect
          namespace: media
      services:
        - name: speedtest
          port: 3000
