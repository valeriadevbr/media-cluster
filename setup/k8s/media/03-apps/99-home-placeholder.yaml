apiVersion: v1
kind: ConfigMap
metadata:
  name: home-html
  namespace: media
data:
  default.conf: |
    server {
      listen       8081;
      server_name  localhost;
      root         /usr/share/nginx/html;

      # 1. Homepage
      location = / {
        try_files /index.html =404;
      }
      location = /index.html {
        try_files /index.html =404;
      }

      location /game/ {
        proxy_pass http://127.0.0.1:80/;
      }

      location / {
        try_files $uri $uri/ @pacman_assets;
      }

      location @pacman_assets {
        proxy_pass http://127.0.0.1:80;
      }
    }
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Media Cluster - Home</title>
        <style>
            body {
                background-color: #1a1a1a;
                color: white;
                font-family: sans-serif;
                text-align: center;
                height: 100vh; /* Full viewport height */
                display: flex;
                flex-direction: column;
                margin: 0;
                overflow: hidden;
            }
            h1 {
                margin: 10px 0;
                text-shadow: 0 0 10px #00ff00;
                flex-shrink: 0;
            }
            .container {
                flex: 1; /* Automatically fill remaining space */
                width: 100%;
                box-sizing: border-box;
                padding: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
                min-width: 44vh;
            }
            .frame-wrapper {
                border: 2px solid #333;
                border-radius: 10px;
                background: black;
                box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
                width: 100%;
                height: 100%;
                overflow: hidden;
                transform-origin: top center;
            }
            iframe {
                border: none;
                width: 100%;
                height: 100%;
            }
            .links {
                margin: 15px 0;
                flex-shrink: 0;
            }
            a {
                color: #00ff00;
                margin: 0 10px;
                text-decoration: none;
                font-size: 1.2em;
            }
            a:hover {
                text-shadow: 0 0 5px #00ff00;
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <h1>🚀 Media Cluster Running</h1>

        <div class="container">
            <div class="frame-wrapper">
                <iframe src="/game/" title="Pacman" scrolling="no"></iframe>
            </div>
        </div>

        <div class="links">
            <a href="https://plex.${WAN_HOSTNAME}">Plex</a> |
            <a href="https://emby.${WAN_HOSTNAME}">Emby</a>
        </div>
    <script>
        function resizeGame() {
            const wrapper = document.querySelector('.frame-wrapper');
            const container = document.querySelector('.container');
            const gameWidth = 960; // Must match CSS
            // We focus on horizontal resizing as requested
            const availableWidth = container.clientWidth - 20;

            // Scale down if screen is smaller than game
            const scale = Math.min(1, availableWidth / gameWidth);

            wrapper.style.transform = `scale(${scale})`;
            wrapper.style.display = 'block';
        }

        window.addEventListener('resize', resizeGame);
        window.addEventListener('load', resizeGame);
    </script>
    </body>
    </html>
  robots.txt: |
    User-agent: *
    Disallow: /
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-placeholder
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home-placeholder
  template:
    metadata:
      labels:
        app: home-placeholder
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
        - name: pacman
          image: nsahil992/pacman-game:latest
          ports:
            - containerPort: 80
      volumes:
        - name: html
          configMap:
            name: home-html
            items:
              - key: index.html
                path: index.html
              - key: robots.txt
                path: robots.txt

        - name: config
          configMap:
            name: home-html
            items:
              - key: default.conf
                path: default.conf
---
apiVersion: v1
kind: Service
metadata:
  name: home-placeholder
  namespace: media
spec:
  selector:
    app: home-placeholder
  ports:
    - name: http-home
      protocol: TCP
      port: 80
      targetPort: 8081
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-lan
  namespace: media
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`media.lan`)
      kind: Rule
      services:
        - name: home-placeholder
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-wan
  namespace: media
spec:
  entryPoints:
    - websecure-wan
  routes:
    - match: Host(`${WAN_HOSTNAME}`)
      kind: Rule
      services:
        - name: home-placeholder
          port: 80
    - match: Host(`www.${WAN_HOSTNAME}`)
      kind: Rule
      middlewares:
        - name: www-redirect
          namespace: media
      services:
        - name: home-placeholder
          port: 80
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-wan-http
  namespace: media
spec:
  entryPoints:
    - web-wan
  routes:
    - match: Host(`${WAN_HOSTNAME}`) || Host(`www.${WAN_HOSTNAME}`)
      kind: Rule
      middlewares:
        - name: https-redirect
          namespace: media
      services:
        - name: home-placeholder
          port: 80
